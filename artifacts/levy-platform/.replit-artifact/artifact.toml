kind = "web"
previewPath = "/"
title = "Levy Collection Platform"
version = "1.0.0"
id = "artifacts/levy-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24247

[services.development]
run = "pnpm --filter @workspace/levy-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/levy-platform", "run", "build" ]
publicDir = "artifacts/levy-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24247"
BASE_PATH = "/"
