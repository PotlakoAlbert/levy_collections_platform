          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Assignee created

  /matter-assignees/{id}/unassign:
    patch:
      operationId: unassignMatterAssignee
      tags: [schema-admin]
      summary: Unassign matter assignee
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Unassigned

  /auto-advance-rules:
    get:
      operationId: listAutoAdvanceRules
      tags: [schema-admin]
      summary: List auto-advance rules
      responses:
        "200":
          description: Rules list
    post:
      operationId: createAutoAdvanceRule
      tags: [schema-admin]
      summary: Create auto-advance rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Rule created

  /auto-advance-rules/{fromStage}/{toStage}:
    get:
      operationId: getAutoAdvanceRule
      tags: [schema-admin]
      summary: Get auto-advance rule by stages
      parameters:
        - name: fromStage
          in: path
          required: true
          schema: { type: string }
        - name: toStage
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Rule

  /auto-advance-rules/{id}:
    patch:
      operationId: updateAutoAdvanceRule
      tags: [schema-admin]
      summary: Update auto-advance rule
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Rule updated

  /bot-states/{matterId}:
    get:
      operationId: getBotState
      tags: [schema-admin]
      summary: Get bot state for matter
      parameters:
        - name: matterId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Bot state
    patch:
      operationId: updateBotState
      tags: [schema-admin]
      summary: Update bot state
      parameters:
        - name: matterId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Bot state updated

  /bot-states:
    post:
      operationId: createBotState
      tags: [schema-admin]
      summary: Create bot state
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Bot state created

  /bot-states/{matterId}/escalate:
    patch:
      operationId: escalateBotState
      tags: [schema-admin]
      summary: Escalate bot state
      parameters:
        - name: matterId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
