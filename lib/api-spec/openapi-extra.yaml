      tags: [whatsapp]
      summary: WhatsApp webhook verification (Meta)
      parameters:
        - name: hub.mode
          in: query
          schema: { type: string }
        - name: hub.verify_token
          in: query
          schema: { type: string }
        - name: hub.challenge
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Challenge returned
    post:
      operationId: whatsappWebhookReceive
      tags: [whatsapp]
      summary: Receive WhatsApp webhook events
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Event received

  /test-whatsapp-send:
