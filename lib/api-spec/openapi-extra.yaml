          description: PTP deactivated

  /matters/{id}/generate-tasks:
    post:
      operationId: generateMatterTasks
      tags: [matters]
      summary: Generate tasks for matter stage
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Tasks generated

  /matters/{id}/assignees:
    get:
      operationId: listMatterAssignees
      tags: [matters]
      summary: List matter assignees
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Assignees list
    post:
      operationId: assignMatterUser
      tags: [matters]
      summary: Assign user to matter
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: string }
                role: { type: string }
      responses:
        "201":
          description: User assigned

  /matters/{id}/assignees/{assigneeId}:
    delete:
      operationId: removeMatterAssignee
      tags: [matters]
      summary: Remove matter assignee
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: assigneeId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Assignee removed

  /matters/{id}/whatsapp/send:
    post:
      operationId: sendMatterWhatsApp
      tags: [whatsapp, matters]
      summary: Send WhatsApp message for matter
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
                templateName: { type: string }
      responses:
        "200":
          description: Message sent

  /matters/{id}/whatsapp/messages:
    get:
      operationId: listMatterWhatsAppMessages
      tags: [whatsapp, matters]
      summary: List WhatsApp messages for matter
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: WhatsApp messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WhatsappMessage"

  /reports/automation/weekly:
    get:
      operationId: getWeeklyAutomationReport
      tags: [reports]
      summary: Weekly automation report
      responses:
        "200":
          description: Weekly report

  /reports/automation/monthly:
    get:
      operationId: getMonthlyAutomationReport
      tags: [reports]
      summary: Monthly automation report
      responses:
        "200":
          description: Monthly report

  /reports/automation/summary:
    get:
      operationId: getAutomationReportSummary
      tags: [reports]
      summary: Automation report summary
      responses:
        "200":
          description: Summary

  /reports/automation/generate:
    post:
      operationId: generateAutomationReport
      tags: [reports]
      summary: Generate automation report
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type: { type: string, enum: [weekly, monthly] }
      responses:
        "200":
          description: Report generated

  /admin/health:
    get:
      operationId: adminHealth
      tags: [admin]
      summary: Admin system health
      responses:
        "200":
          description: System health

  /admin/queues:
    get:
      operationId: adminListQueues
      tags: [admin]
      summary: List job queues
      responses:
        "200":
          description: Queue list

  /admin/queues/{queueName}:
    get:
      operationId: adminQueueDetail
      tags: [admin]
      summary: Queue detail and jobs
      parameters:
        - name: queueName
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Queue detail

  /admin/automation-metrics:
    get:
      operationId: adminAutomationMetrics
      tags: [admin]
      summary: Automation metrics
      responses:
        "200":
          description: Metrics

  /admin/config:
    get:
      operationId: adminConfig
      tags: [admin]
      summary: System configuration (non-secret)
      responses:
        "200":
          description: Config

  /matter-assignees/{matterId}:
    get:
      operationId: listMatterAssigneesSchema
      tags: [schema-admin]
      summary: List matter assignees (schema admin)
      parameters:
        - name: matterId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Assignees

  /matter-assignees:
    post:
      operationId: createMatterAssignee
      tags: [schema-admin]
      summary: Create matter assignee
      requestBody:
        required: true
