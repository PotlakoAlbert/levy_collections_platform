# Additional API endpoints not yet in openapi.yaml (merged at runtime for Swagger UI)
tags:
  - name: public
    description: Public unauthenticated endpoints
  - name: communications
    description: Communications log
  - name: creditors
    description: Creditor management
  - name: requisitions
    description: Requisition management
  - name: posting-codes
    description: Posting code management
  - name: transactions
    description: Matter transactions
  - name: admin
    description: Admin dashboard and monitoring
  - name: schema-admin
    description: Schema administration (assignees, rules, bot states)
  - name: whatsapp
    description: WhatsApp integration
  - name: automations
    description: Automation testing and monitoring
  - name: dev
    description: Development and diagnostic endpoints

paths:
  /contact:
    post:
      operationId: submitContact
      tags: [public]
      summary: Submit public contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, format: email }
                message: { type: string }
              required: [email, message]
      responses:
        "201":
          description: Contact request received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /communications:
    get:
      operationId: listCommunications
      tags: [communications]
      summary: List communications
      parameters:
        - name: matterId
          in: query
          schema: { type: string }
        - name: debtorId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Communications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Communication"
    post:
      operationId: createCommunication
      tags: [communications]
      summary: Log a communication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                matterId: { type: string }
                debtorId: { type: string }
                channel: { type: string }
                direction: { type: string, enum: [inbound, outbound] }
                content: { type: string }
              required: [channel, direction, content]
      responses:
        "201":
          description: Communication logged

  /creditors:
    get:
      operationId: listCreditors
      tags: [creditors]
      summary: List creditors
      responses:
        "200":
          description: Creditors list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      operationId: createCreditor
      tags: [creditors]
      summary: Create creditor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Creditor created

  /requisitions:
    get:
      operationId: listRequisitions
      tags: [requisitions]
      summary: List requisitions
      responses:
        "200":
          description: Requisitions list
    post:
      operationId: createRequisition
      tags: [requisitions]
      summary: Create requisition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Requisition created

  /posting-codes:
    get:
      operationId: listPostingCodes
      tags: [posting-codes]
      summary: List posting codes
      responses:
        "200":
          description: Posting codes list
    post:
      operationId: createPostingCode
      tags: [posting-codes]
      summary: Create posting code (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Posting code created

  /matters/{id}/transactions:
    get:
      operationId: listMatterTransactions
      tags: [transactions]
      summary: List matter transactions
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Transactions list
    post:
      operationId: createMatterTransaction
      tags: [transactions]
      summary: Create matter transaction
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Transaction created

  /debtors/{id}/activity:
    get:
      operationId: getDebtorActivity
      tags: [debtors]
      summary: Get debtor activity log
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Activity log

  /debtors/{id}:
    delete:
      operationId: deleteDebtor
      tags: [debtors]
      summary: Delete debtor (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Debtor deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users/{id}:
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User deleted

  /documents/{id}/send:
    post:
      operationId: sendDocument
      tags: [documents]
      summary: Send document to debtor
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                channel: { type: string, enum: [email, whatsapp] }
      responses:
        "200":
          description: Document sent

  /tasks/{id}/archive:
    patch:
      operationId: archiveTask
      tags: [tasks]
      summary: Archive a task (removes from dashboard and diary)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/unarchive:
    patch:
      operationId: unarchiveTask
      tags: [tasks]
      summary: Restore an archived task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}/history:
    get:
      operationId: getTaskHistory
      tags: [tasks]
      summary: Get task history
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Task history

  /matters/{id}/ptp:
    get:
      operationId: getMatterPtp
      tags: [matters]
      summary: Get promise-to-pay arrangements
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: PTP arrangements
    post:
      operationId: createMatterPtp
      tags: [matters]
      summary: Create promise-to-pay arrangement
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: PTP created

  /matters/{id}/ptp/deactivate:
    patch:
      operationId: deactivateMatterPtp
      tags: [matters]
      summary: Deactivate promise-to-pay
      parameters:
        - name: id
          in: path
